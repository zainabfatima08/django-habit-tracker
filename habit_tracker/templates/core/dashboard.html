{% extends 'base.html' %}

{% block content %}

<div class="grid">

    <div class="card">
        <h3>Habits</h3>
        <p>{{ total_habits }}</p>
    </div>

    <div class="card">
        <h3>Pending Tasks</h3>
        <p>{{ pending_tasks }}</p>
    </div>

</div>

<h3>Quick Habits</h3>

{% for h in habits %}
    <div class="item">{{ h.title }}</div>
{% endfor %}

<h3>Tasks</h3>

{% for t in tasks %}
    <div class="item">{{ t.title }}</div>
{% endfor %}

{% endblock %}
