{% extends 'base.html' %}

{% block content %}
<div class="header">
    <div class="page-header">
        <h2>{{ habit.title }}</h2>
        <span class="badge done">Streak: {{ streak }}</span>
    </div>

    <div class="actions">
        <button
            hx-post="{% url 'toggle_habit' habit.id %}"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            hx-target="#toggle-result"
            hx-swap="innerHTML">
            Toggle Today
        </button>
        <div id="toggle-result"></div>
    </div>
</div>

<h3>History</h3>
<div class="log-list">
    {% for log in logs %}
        <div class="item">
            <span>{{ log.date }}</span>
            {% if log.completed %}
                <span class="badge done">Completed</span>
            {% else %}
                <span class="badge pending">Not Completed</span>
            {% endif %}
        </div>
    {% empty %}
        <div class="item"><span>No history yet.</span></div>
    {% endfor %}
</div>
{% endblock %}
