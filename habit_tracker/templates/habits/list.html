{% extends 'index.html' %}

{% block content %}
<div class="page-header">
    <h2>Habits</h2>
</div>

<div class="card">
    <form class="inline-form" method="post" action="{% url 'habit_create' %}">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Create a new habit" required>
        <button type="submit">Add Habit</button>
    </form>
</div>

<div class="card search-card">
    <input type="text" placeholder="Search habits instantly..." data-filter-input="#habit-list">
</div>

<div class="list-stack" id="habit-list">
    {% for h in habits %}
    <div class="item" data-filter-item>
        <a href="{% url 'habit_detail' h.id %}">{{ h.title }}</a>

        <button
            hx-post="{% url 'toggle_habit' h.id %}"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            hx-swap="innerHTML">
            Toggle
        </button>
    </div>
    {% empty %}
        <div class="item">No habits added yet.</div>
    {% endfor %}
</div>
{% endblock %}
