{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Tasks</h2>
</div>

<div class="card">
    <form method="post" action="{% url 'task_create' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Task</button>
    </form>
</div>

<div class="list-stack">
    {% for t in tasks %}
    <div class="item">
        <strong>{{ t.title }}</strong>
        <div class="inline-form">
            <button hx-post="{% url 'task_toggle' t.id %}" hx-swap="innerHTML">
                Toggle
            </button>

            <form method="post" action="{% url 'task_delete' t.id %}">
                {% csrf_token %}
                <button type="submit" class="danger">Delete</button>
            </form>
        </div>
    </div>
    {% empty %}
        <div class="item">No tasks available.</div>
    {% endfor %}
</div>
{% endblock %}
