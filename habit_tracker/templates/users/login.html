{% extends 'index.html' %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-box">
        <h2>Welcome Back</h2>

        <p class="brand-subtitle">Login and continue your progress.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>

        <p class="auth-switch">New here? <a href="{% url 'signup' %}">Create account</a></p>
    </div>
</div>

{% endblock %}
