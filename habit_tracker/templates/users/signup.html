{% extends 'index.html' %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-box">
        <h2>Create Account</h2>


        <p class="brand-subtitle">Join and start building consistency.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign up</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</div>

{% endblock %}
