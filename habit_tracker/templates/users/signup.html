{% extends 'base.html' %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-box">
        <h2>Create Account</h2>
        <p class="brand-subtitle">Join and start building consistency.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign up</button>
        </form>
    </div>
</div>
{% endblock %}
